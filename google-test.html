<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Google Login Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<h2>Google Login Test</h2>

<div id="g_id_onload"
     data-client_id="314219084409-rb4di47f6utak4fach9729i5u17e6pcg.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>
<div class="g_id_signin" data-type="standard"></div>

<h3>idToken</h3>
<textarea id="idToken" rows="6" cols="90" readonly></textarea>

<h3>백엔드 응답 (/auth/login/google)</h3>
<pre id="result" style="background:#f4f4f4; padding:10px; white-space:pre-wrap;"></pre>

<script>
    const API_BASE = "http://localhost:8080";

    function handleCredentialResponse(response) {
        const idToken = response.credential;
        document.getElementById("idToken").value = idToken;
        console.log("idToken:", idToken);
        callLoginApi(idToken);
    }

    async function callLoginApi(idToken) {
        const resultEl = document.getElementById("result");
        try {
            const res = await fetch(`${API_BASE}/auth/login/google`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idToken })
            });
            const data = await res.json();
            resultEl.textContent = `status: ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
        } catch (e) {
            resultEl.textContent = "요청 실패: " + e;
        }
    }
</script>
</body>
</html>
